name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

# Cancel an in-progress run when a newer commit arrives on the same branch/PR.
# head_ref is set for pull_request events (branch name); ref is the fallback for pushes.
concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.ref }}
  cancel-in-progress: true

jobs:
  # ── 1. Tests ──────────────────────────────────────────────────────────────
  # Fast, runs on all three OS in parallel for every push and PR.
  test:
    name: Test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test

  # ── 2. Build frontend ─────────────────────────────────────────────────────
  # Runs once on Linux; the dist/ artifact is shared by all package jobs.
  build-frontend:
    name: Build frontend
    runs-on: ubuntu-latest
    needs: test

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build frontend
        run: npm run build --workspace=src/frontend

      - name: Upload frontend dist
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: dist/

  # ── 3. Package binaries ───────────────────────────────────────────────────
  # Each OS runner builds its own SEA binary; all three run in parallel.
  package:
    name: Package (${{ matrix.os }})
    needs: build-frontend
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build SEA binary
        run: npm run package --workspace=src/backend

      - name: Upload binary
        uses: actions/upload-artifact@v4
        with:
          name: binary-${{ matrix.os }}
          path: release/

  # ── 4. Combine into single release artifact ───────────────────────────────
  # Downloads all three binaries + the shared dist/ and packs them together.
  combine:
    name: Combine release artifact
    needs: package
    runs-on: ubuntu-latest

    steps:
      - name: Download frontend dist
        uses: actions/download-artifact@v4
        with:
          name: frontend-dist
          path: release/dist/

      - name: Download Linux binary
        uses: actions/download-artifact@v4
        with:
          name: binary-ubuntu-latest
          path: release/

      - name: Download Windows binary
        uses: actions/download-artifact@v4
        with:
          name: binary-windows-latest
          path: release/

      - name: Download macOS binary
        uses: actions/download-artifact@v4
        with:
          name: binary-macos-latest
          path: release/

      - name: Make Linux and macOS binaries executable
        run: |
          chmod +x release/ai-story-builder-linux  || true
          chmod +x release/ai-story-builder-macos  || true

      - name: Upload combined release
        uses: actions/upload-artifact@v4
        with:
          name: release
          path: release/
