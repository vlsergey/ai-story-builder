name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

# Cancel an in-progress run when a newer commit arrives on the same branch/PR.
# head_ref is set for pull_request events (branch name); ref is the fallback for pushes.
concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.ref }}
  cancel-in-progress: true

jobs:
  # ── 1. Tests ──────────────────────────────────────────────────────────────
  # Fast, runs on all three OS in parallel for every push and PR.
  test:
    name: Test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - name: Restore npm cache
        uses: actions/cache@v4
        with:
          path: ~/.npm
          key: ${{ runner.os }}-npm-${{ hashFiles('**/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-npm-

      - name: Install dependencies
        run: npm ci --prefer-offline --no-audit

      - name: Lint-check
        run: npm run lint

      - name: Type-check
        run: npm run typecheck

      - name: Run tests
        run: npm test

  # ── 2. Package Electron app ───────────────────────────────────────────────
  # Each OS runner builds its own native installer in parallel.
  package:
    name: Package (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    needs: test
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
          - os: windows-latest
          - os: macos-latest
            arch: x64
          - os: macos-latest
            arch: arm64

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - name: Restore npm cache
        uses: actions/cache@v4
        with:
          path: ~/.npm
          key: ${{ runner.os }}-npm-${{ hashFiles('**/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-npm-

      - name: Install dependencies
        run: npm ci --prefer-offline --no-audit

      - name: Package (macOS)
        if: matrix.os == 'macos-latest'
        run: npm run package -- --mac --${{ matrix.arch }}
        env:
          # Skip macOS code signing in CI (no certificate available)
          CSC_IDENTITY_AUTO_DISCOVERY: false

      - name: Package (other OS)
        if: matrix.os != 'macos-latest'
        run: npm run package
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: false

      - name: Upload release artifacts
        uses: actions/upload-artifact@v7
        with:
          # Add arch to artifact name to avoid overwriting
          name: release-${{ matrix.os }}-${{ matrix.arch || 'default' }}
          path: release/
